name: Build Windows exe

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PySide6 pyinstaller

      - name: Show PySide6 path
        run: |
          python - <<'PY'
          import os, PySide6, sys
          p = os.path.join(os.path.dirname(PySide6.__file__), "plugins")
          print("PY_SIDE_PLUGINS_PATH=", p)
          PY

      - name: Build with PyInstaller
        run: |
          python - <<'PY'
          import os, PySide6, subprocess, sys
          p = os.path.join(os.path.dirname(PySide6.__file__), "plugins")
          print("Using plugins path:", p)
          cmd = [
            "pyinstaller",
            "--noconfirm",
            "--onefile",
            "--windowed",
            "--add-data", f"{p};PySide6\\plugins",
            "--name", "StalcraftCalculator",
            "stalcraft_calculator.py"
          ]
          print("Running:", " ".join(cmd))
          subprocess.check_call(cmd)
          PY

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: StalcraftCalculator-windows
          path: dist/StalcraftCalculator.exe
