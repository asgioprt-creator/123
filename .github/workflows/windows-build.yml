name: Build Windows exe

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PySide6 pyinstaller
        shell: pwsh

      - name: Show PySide6 path
        run: |
          $p = (python -c "import os, PySide6; print(os.path.join(os.path.dirname(PySide6.__file__), 'plugins'))").Trim()
          Write-Host "PY_SIDE_PLUGINS_PATH=$p"
        shell: pwsh

      - name: Build with PyInstaller
        run: |
          $p = (python -c "import os, PySide6; print(os.path.join(os.path.dirname(PySide6.__file__), 'plugins'))").Trim()
          Write-Host "Using plugins path: $p"
          pyinstaller --noconfirm --onefile --windowed --add-data "$p;PySide6\plugins" --name StalcraftCalculator stalcraft_calculator.py
        shell: pwsh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: StalcraftCalculator-windows
          path: dist/StalcraftCalculator.exe
